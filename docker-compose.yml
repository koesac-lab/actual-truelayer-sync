services:
  actual-truelayer-setup:
    build: ./truelayer-setup
    image: actual-truelayer-setup:latest
    container_name: actual-truelayer-setup
    ports:
      - "3099:3099"
    env_file: .env
    volumes:
      - ./truelayer-data:/app/data
    networks:
      - finance
    profiles:
      - setup

networks:
  finance:
    driver: bridge
